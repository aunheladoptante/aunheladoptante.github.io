<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | PSTS Researcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .wide-container { box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
        .sidebar-border { border-left: 1px solid #f1f5f9; }
        @media (max-width: 768px) { .sidebar-border { border-left: none; border-top: 1px solid #f1f5f9; } }
    </style>
</head>
<body class="text-slate-900 antialiased p-2 md:p-6">

    <main class="max-w-7xl mx-auto bg-white border border-slate-200 rounded-xl wide-container overflow-hidden">
        
        <div id="section-header"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12">
            <div class="lg:col-span-9 p-8 md:p-12">
                <div id="section-research"></div>
                <div id="section-projects" class="mt-16"></div>
            </div>

            <div class="lg:col-span-3 p-8 md:p-12 sidebar-border bg-slate-50/20">
                <div id="section-sidebar"></div>
            </div>
        </div>
    </main>

    <script>
        async function loadSection(id, file) {
            try {
                const response = await fetch(`sections/${file}`);
                const content = await response.text();
                document.getElementById(id).innerHTML = content;
            } catch (err) {
                console.error(`Error loading ${file}:`, err);
            }
        }

        // Load all fragments
        window.onload = () => {
            loadSection('section-header', 'header.html');
            loadSection('section-research', 'research.html');
            loadSection('section-projects', 'projects.html');
            loadSection('section-sidebar', 'sidebar.html');
        };
    </script>
</body>
</html>
